<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elige tu Estilo - Kimün</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #F8F9FA 0%, #E9ECEF 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .style-card {
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }
        .style-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        .style-card.selected {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px #171717;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">
    <div class="w-full max-w-5xl">
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-accent text-white mb-6">
                <i class="bi bi-palette-fill text-2xl"></i>
            </div>
            <h1 class="font-display text-4xl font-semibold text-accent tracking-tight mb-2">Elige tu Estilo</h1>
            <p class="text-muted">Selecciona el diseño que más te convenga para la plataforma</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div onclick="selectStyle('minimal')" class="style-card bg-white rounded-2xl overflow-hidden shadow-lg" id="card-minimal">
                <div class="h-40 bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center">
                    <div class="text-center p-6">
                        <div class="w-12 h-12 mx-auto mb-3 bg-white rounded-xl shadow-sm flex items-center justify-center">
                            <div class="w-6 h-1 bg-gray-800 rounded"></div>
                        </div>
                        <div class="h-2 w-24 bg-gray-300 rounded mx-auto"></div>
                    </div>
                </div>
                <div class="p-6">
                    <h3 class="font-display font-semibold text-lg text-accent">Minimal</h3>
                    <p class="text-sm text-muted mt-1">Limpio, moderno y profesional</p>
                    <div class="mt-4 flex items-center gap-2">
                        <span class="w-3 h-3 bg-gray-800 rounded-full"></span>
                        <span class="w-3 h-3 bg-gray-300 rounded-full"></span>
                        <span class="w-3 h-3 bg-gray-200 rounded-full"></span>
                    </div>
                </div>
            </div>
            
            <div onclick="selectStyle('brutal')" class="style-card bg-[#FFE600] rounded-2xl overflow-hidden shadow-lg" id="card-brutal">
                <div class="h-40 bg-black flex items-center justify-center">
                    <div class="text-center p-6 text-[#FFE600]">
                        <div class="text-2xl font-bold uppercase tracking-wider">KIMÜN</div>
                        <div class="mt-2 h-1 w-16 bg-[#FFE600] mx-auto"></div>
                    </div>
                </div>
                <div class="p-6 bg-black text-[#FFE600]">
                    <h3 class="font-display font-semibold text-lg">Brutal</h3>
                    <p class="text-sm text-[#FFE600]/70 mt-1">Alto contraste y audaz</p>
                    <div class="mt-4 flex items-center gap-2">
                        <span class="w-3 h-3 bg-[#FFE600] rounded-full"></span>
                        <span class="w-3 h-3 bg-black border border-[#FFE600] rounded-full"></span>
                        <span class="w-3 h-3 bg-white rounded-full"></span>
                    </div>
                </div>
            </div>
            
            <div onclick="selectStyle('glass')" class="style-card bg-white/30 backdrop-blur rounded-2xl overflow-hidden shadow-lg border border-white/50" id="card-glass">
                <div class="h-40 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-white/10 backdrop-blur-sm"></div>
                    <div class="text-center p-6 text-white relative z-10">
                        <div class="text-2xl font-light tracking-wider">KIMÜN</div>
                    </div>
                </div>
                <div class="p-6 bg-white/20 backdrop-blur">
                    <h3 class="font-display font-semibold text-lg text-gray-900">Glass</h3>
                    <p class="text-sm text-gray-600 mt-1">Efecto cristal translúcido</p>
                    <div class="mt-4 flex items-center gap-2">
                        <span class="w-3 h-3 bg-indigo-500 rounded-full"></span>
                        <span class="w-3 h-3 bg-pink-500 rounded-full"></span>
                        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-12">
            <form id="styleForm" method="get" action="{% url 'usuarios:login' %}">
                <input type="hidden" name="style" id="styleInput" value="">
                <button type="submit" id="confirmBtn" class="bg-accent hover:bg-gray-800 text-white font-medium py-3 px-8 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i class="bi bi-check2-circle mr-2"></i>Confirmar Selección
                </button>
            </form>
            <p class="text-sm text-muted mt-4">
                <a href="{% url 'usuarios:login' %}" class="hover:text-accent underline">O continuar con el estilo predeterminado</a>
            </p>
        </div>
    </div>
    
    <script>
        let selectedStyle = null;
        
        function selectStyle(style) {
            selectedStyle = style;
            
            document.querySelectorAll('.style-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            document.getElementById('card-' + style).classList.add('selected');
            
            const btn = document.getElementById('confirmBtn');
            btn.disabled = false;
        }
        
        document.getElementById('styleForm').addEventListener('submit', function(e) {
            if (selectedStyle) {
                document.getElementById('styleInput').value = selectedStyle;
            }
        });
    </script>
</body>
</html>
