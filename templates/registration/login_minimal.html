<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Kimün</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
            font-family: 'DM Sans', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .input-field {
            background: transparent;
            border: none;
            border-bottom: 2px solid #e5e5e5;
            padding: 12px 0;
            transition: border-color 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-bottom-color: #1a1a1a;
        }
        .input-field::placeholder {
            color: #999;
        }
        .btn-submit {
            background: #1a1a1a;
            color: white;
            padding: 14px 32px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        .logo-mark {
            width: 48px;
            height: 48px;
            border: 2px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="logo-mark mx-auto mb-4">
                <i class="bi bi-mortarboard-fill text-xl" style="color: #1a1a1a;"></i>
            </div>
            <h1 class="font-serif text-3xl font-semibold tracking-tight" style="color: #1a1a1a;">Kimün</h1>
            <p class="text-sm mt-2" style="color: #666;">Plataforma de Capacitación</p>
        </div>
        
        <div class="login-card rounded-sm p-10 shadow-sm">
            {% if form.errors %}
            <div class="mb-6 p-4 bg-red-50 text-red-800 text-sm border-l-2 border-red-300">
                Error de inicio de sesión
            </div>
            {% endif %}
            
            <form method="post" autocomplete="on">
                {% csrf_token %}
                <div class="mb-8">
                    <label class="block text-xs uppercase tracking-wider mb-2" style="color: #666;">Usuario</label>
                    <input type="text" name="username" required 
                        class="input-field w-full text-lg"
                        placeholder="Ingrese su usuario">
                </div>
                <div class="mb-10">
                    <label class="block text-xs uppercase tracking-wider mb-2" style="color: #666;">Contraseña</label>
                    <input type="password" name="password" required 
                        class="input-field w-full text-lg"
                        placeholder="Ingrese su contraseña">
                </div>
                <button type="submit" class="btn-submit w-full rounded-sm">
                    INICIAR SESIÓN
                </button>
            </form>
        </div>
        
        <div class="text-center mt-8">
            <p class="text-xs" style="color: #999;">© 2026 ONG ALUMCO</p>
        </div>
    </div>
</body>
</html>
