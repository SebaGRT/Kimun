<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Kimün</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: {
                            yellow: '#FFE600',
                            black: '#0D0D0D',
                            gray: '#2A2A2A',
                            white: '#F5F5F5'
                        }
                    },
                    fontFamily: {
                        mono: ['Courier New', 'monospace']
                    },
                    boxShadow: {
                        brutal: '8px 8px 0px 0px #0D0D0D',
                        'brutal-hover': '4px 4px 0px 0px #0D0D0D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: repeating-linear-gradient(
                45deg,
                #f5f5f5,
                #f5f5f5 10px,
                #eeeeee 10px,
                #eeeeee 20px
            );
            font-family: 'Courier New', monospace;
        }
        .brutal-box {
            box-shadow: 8px 8px 0px 0px #0D0D0D;
            transition: all 0.1s ease;
        }
        .brutal-box:hover {
            box-shadow: 4px 4px 0px 0px #0D0D0D;
            transform: translate(4px, 4px);
        }
        .brutal-btn {
            box-shadow: 6px 6px 0px 0px #0D0D0D;
        }
        .brutal-btn:active {
            box-shadow: 0px 0px 0px 0px #0D0D0D;
            transform: translate(6px, 6px);
        }
        .brutal-input {
            box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="bg-brutal-yellow p-6 mb-0 border-4 border-brutal-black">
            <h1 class="text-4xl font-bold uppercase tracking-wider border-b-4 border-brutal-black pb-2">
                <i class="bi bi-mortarboard-fill mr-3"></i>Kimün
            </h1>
        </div>
        
        <div class="bg-white border-4 border-brutal-black p-8 -mt-2 brutal-box">
            <div class="bg-brutal-black text-brutal-yellow px-4 py-2 mb-6 font-bold uppercase text-sm">
                /// ACCESO SEGURO
            </div>
            
            {% if form.errors %}
            <div class="mb-6 bg-red-500 text-white px-4 py-3 border-2 border-brutal-black font-bold uppercase text-sm">
                <i class="bi bi-exclamation-triangle mr-2"></i>ERROR: Credenciales inválidas
            </div>
            {% endif %}
            
            <form method="post" autocomplete="on">
                {% csrf_token %}
                <div class="mb-6">
                    <label class="block bg-brutal-black text-white px-3 py-2 font-bold uppercase text-sm mb-2">
                        > Usuario_
                    </label>
                    <input type="text" name="username" required 
                        class="w-full bg-brutal-gray text-white px-4 py-3 border-2 border-brutal-black brutal-input font-mono"
                        placeholder="INGRESE_USUARIO">
                </div>
                <div class="mb-8">
                    <label class="block bg-brutal-black text-white px-3 py-2 font-bold uppercase text-sm mb-2">
                        > Contraseña_
                    </label>
                    <input type="password" name="password" required 
                        class="w-full bg-brutal-gray text-white px-4 py-3 border-2 border-brutal-black brutal-input font-mono"
                        placeholder="**************">
                </div>
                <button type="submit" class="brutal-btn w-full bg-brutal-yellow border-2 border-brutal-black px-6 py-4 font-bold uppercase text-lg hover:bg-brutal-black hover:text-brutal-yellow transition-colors">
                    <i class="bi bi-play-fill mr-2"></i>ENTRAR
                </button>
            </form>
        </div>
        
        <div class="text-center mt-6">
            <p class="bg-brutal-black text-white px-4 py-2 font-mono text-sm inline-block">
                © 2026 /// ONG ALUMCO
            </p>
        </div>
    </div>
</body>
</html>
