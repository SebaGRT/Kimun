<!DOCTYPE html>
<html lang="es" data-theme="light">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Kimün</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            font-size: 18px;
        }
        
        [data-theme="light"] {
            --color-bg: #f8f9fa;
            --color-surface: #ffffff;
            --color-primary: #1e3a5f;
            --color-primary-hover: #2d5a87;
            --color-accent: #f57c00;
            --color-text: #1e3a5f;
            --color-text-secondary: #6c757d;
            --color-border: #dee2e6;
            --gradient-start: #1e3a5f;
            --gradient-end: #3b82f6;
        }
        
        [data-theme="dark"] {
            --color-bg: #0f172a;
            --color-surface: #1e293b;
            --color-primary: #60a5fa;
            --color-primary-hover: #93c5fd;
            --color-accent: #fbbf24;
            --color-text: #f1f5f9;
            --color-text-secondary: #94a3b8;
            --color-border: #334155;
            --gradient-start: #1e3a5f;
            --gradient-end: #3b82f6;
        }
        
        body {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            min-height: 100vh;
        }
        
        .login-card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
        }
        
        .input-field {
            background-color: var(--color-surface);
            border: 2px solid var(--color-border);
            color: var(--color-text);
            transition: border-color 0.2s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        .input-field::placeholder {
            color: var(--color-text-secondary);
        }
        
        .btn-primary {
            background-color: var(--color-primary);
            color: white;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: var(--color-primary-hover);
            transform: translateY(-1px);
        }
    </style>
    <script>
        // Theme toggle logic
        (function() {
            const stored = localStorage.getItem('kimun-theme') || 'light';
            document.documentElement.setAttribute('data-theme', stored);
            if (stored === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
        
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const newTheme = current === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('kimun-theme', newTheme);
            
            if (newTheme === 'dark') {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <!-- Theme Toggle (fixed) -->
    <button onclick="toggleTheme()" 
        class="fixed top-6 right-6 p-3 rounded-xl transition-colors z-50"
        style="background-color: var(--color-surface); color: var(--color-text-secondary);"
        title="Cambiar modo claro/oscuro">
        <i class="bi bi-moon-stars-fill dark:hidden text-xl"></i>
        <i class="bi bi-sun-fill hidden dark:block text-xl"></i>
    </button>

    <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="login-card rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="p-8 text-center" style="background: linear-gradient(135deg, var(--color-primary), var(--gradient-end));">
                <div class="w-48 h-48 mx-auto mb-4 rounded-2xl flex items-center justify-center bg-white p-4 shadow-lg">
                    <img src="{% static 'alumco.png' %}" alt="ALUMCO" class="w-full h-full object-contain">
                </div>
                <h1 class="text-4xl font-bold text-white">Kimün</h1>
                <p class="text-white/80 mt-3 text-xl">Plataforma de Capacitación</p>
            </div>
            
            <!-- Form -->
            <div class="p-8">
                {% if form.errors %}
                <div class="mb-6 p-4 rounded-lg border-l-4" style="background-color: #fef2f2; border-color: #dc2626;">
                    <p class="font-medium" style="color: #dc2626;">Error de inicio de sesión</p>
                </div>
                {% endif %}
                
                <form method="post" autocomplete="on">
                    {% csrf_token %}
                    <div class="mb-6">
                        <label class="block text-base font-semibold mb-2" style="color: var(--color-primary);">Usuario</label>
                        <input type="text" name="username" required 
                            class="input-field w-full px-4 py-3.5 rounded-xl text-lg"
                            placeholder="Ingrese su usuario">
                    </div>
                    <div class="mb-8">
                        <label class="block text-base font-semibold mb-2" style="color: var(--color-primary);">Contraseña</label>
                        <input type="password" name="password" required 
                            class="input-field w-full px-4 py-3.5 rounded-xl text-lg"
                            placeholder="Ingrese su contraseña">
                    </div>
                    <button type="submit" 
                        class="btn-primary w-full py-3.5 px-6 rounded-xl font-semibold text-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                    </button>
                </form>
            </div>
            
            <!-- Footer -->
            <div class="px-8 py-5 text-center border-t" style="background-color: var(--color-bg); border-color: var(--color-border);">
                <p class="text-base" style="color: var(--color-text-secondary);">© 2026 ONG ALUMCO</p>
            </div>
        </div>
        
        <p class="text-center mt-6 text-white/80 text-sm">
            Plataforma de capacitación para adultos mayores
        </p>
    </div>
</body>
</html>
