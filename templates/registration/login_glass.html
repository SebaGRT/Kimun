<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Kimün</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        glass: {
                            primary: 'rgba(255, 255, 255, 0.25)',
                            border: 'rgba(255, 255, 255, 0.3)',
                            text: 'rgba(255, 255, 255, 0.9)'
                        }
                    },
                    backdropBlur: {
                        xs: '2px'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            outline: none;
        }
        .glass-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .glass-btn:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .floating-delay {
            animation: floating 6s ease-in-out infinite;
            animation-delay: -3s;
        }
        .glow {
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 20px rgba(255,255,255,0.3); }
            to { box-shadow: 0 0 40px rgba(255,255,255,0.6); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute top-20 left-20 w-32 h-32 bg-white/10 rounded-full blur-3xl floating"></div>
        <div class="absolute bottom-20 right-20 w-40 h-40 bg-purple-300/20 rounded-full blur-3xl floating-delay"></div>
        <div class="absolute top-1/2 left-1/3 w-24 h-24 bg-pink-300/20 rounded-full blur-3xl floating" style="animation-delay: -1.5s;"></div>
    </div>
    
    <div class="w-full max-w-md relative z-10">
        <div class="glass-card rounded-3xl p-8 glow">
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-4 rounded-2xl glass-card flex items-center justify-center">
                    <i class="bi bi-mortarboard-fill text-4xl text-white"></i>
                </div>
                <h1 class="text-4xl font-light text-white tracking-wider">Kimün</h1>
                <p class="text-white/70 mt-2 text-sm tracking-wide">Plataforma de Capacitación</p>
            </div>
            
            {% if form.errors %}
            <div class="mb-6 bg-red-500/30 backdrop-blur-sm border border-red-400/50 rounded-xl p-4 text-white text-center">
                <i class="bi bi-exclamation-circle mr-2"></i>Credenciales incorrectas
            </div>
            {% endif %}
            
            <form method="post" autocomplete="on">
                {% csrf_token %}
                <div class="mb-6">
                    <input type="text" name="username" required 
                        class="glass-input w-full px-5 py-4 rounded-xl placeholder-white/60"
                        placeholder="&#xf007;  Usuario">
                </div>
                <div class="mb-8">
                    <input type="password" name="password" required 
                        class="glass-input w-full px-5 py-4 rounded-xl placeholder-white/60"
                        placeholder="&#xf023;  Contraseña">
                </div>
                <button type="submit" class="glass-btn w-full py-4 rounded-xl text-white font-medium text-lg">
                    <i class="bi bi-arrow-right mr-2"></i>Entrar
                </button>
            </form>
        </div>
        
        <div class="text-center mt-8">
            <p class="text-white/50 text-sm">© 2026 ONG ALUMCO</p>
        </div>
    </div>
</body>
</html>
