<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kimün{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #9333ea 100%);
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.4s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .fade-in {
            opacity: 0;
            animation: fadeIn 0.6s ease-out forwards;
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen relative overflow-hidden">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-20 w-64 h-64 bg-white/10 rounded-full blur-3xl floating"></div>
        <div class="absolute bottom-20 right-20 w-80 h-80 bg-purple-300/20 rounded-full blur-3xl floating" style="animation-delay: -2s;"></div>
        <div class="absolute top-1/2 left-1/3 w-48 h-48 bg-pink-300/20 rounded-full blur-3xl floating" style="animation-delay: -4s;"></div>
    </div>
    
    <nav class="glass-nav sticky top-0 z-50 px-8 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="{% url 'inicio' %}" class="flex items-center gap-3 text-2xl font-semibold text-white">
                <div class="w-10 h-10 glass rounded-xl flex items-center justify-center">
                    <i class="bi bi-mortarboard-fill"></i>
                </div>
                <span class="tracking-wide">Kimün</span>
            </a>
            <nav class="flex items-center gap-6">
                <a href="#" class="text-white/70 hover:text-white text-sm font-medium transition-colors">Cursos</a>
                <a href="#" class="text-white/70 hover:text-white text-sm font-medium transition-colors">Certificados</a>
                <div class="h-6 w-px bg-white/20"></div>
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 glass rounded-full flex items-center justify-center">
                        <i class="bi bi-person text-white/80"></i>
                    </div>
                    <span class="text-white/90 text-sm font-medium">{{ user.get_full_name|default:user.username }}</span>
                    <form action="{% url 'usuarios:logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="glass px-3 py-2 rounded-lg text-white/80 hover:text-white hover:bg-white/20 transition-all">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </nav>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-8 py-12 relative z-10">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
