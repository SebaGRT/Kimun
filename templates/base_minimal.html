<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kimün{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        surface: '#FAFAFA',
                        border: '#E5E5E5',
                        muted: '#737373',
                        accent: '#171717',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background: #FAFAFA;
        }
        .card-hover {
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.08);
        }
        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #171717;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-[#FAFAFA] min-h-screen text-accent">
    <header class="bg-white border-b border-border sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-8 py-5">
            <div class="flex justify-between items-center">
                <a href="{% url 'inicio' %}" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 bg-accent text-white flex items-center justify-center rounded-lg group-hover:scale-105 transition-transform">
                        <i class="bi bi-mortarboard-fill text-lg"></i>
                    </div>
                    <span class="font-display text-xl font-semibold tracking-tight">Kimün</span>
                </a>
                <nav class="flex items-center gap-8">
                    <a href="#" class="nav-link text-sm font-medium text-muted hover:text-accent transition-colors">Cursos</a>
                    <a href="#" class="nav-link text-sm font-medium text-muted hover:text-accent transition-colors">Certificados</a>
                    <div class="h-5 w-px bg-border"></div>
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-accent/10 rounded-full flex items-center justify-center">
                            <i class="bi bi-person text-sm"></i>
                        </div>
                        <span class="text-sm font-medium">{{ user.get_full_name|default:user.username }}</span>
                        <form action="{% url 'usuarios:logout' %}" method="post" class="ml-2">
                            {% csrf_token %}
                            <button type="submit" class="text-muted hover:text-accent transition-colors p-1">
                                <i class="bi bi-box-arrow-right"></i>
                            </button>
                        </form>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-8 py-12">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
