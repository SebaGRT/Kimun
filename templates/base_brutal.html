<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kimün{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brutal: { yellow: '#FFE600', black: '#0D0D0D', gray: '#2A2A2A', white: '#F5F5F5' }
                    },
                    fontFamily: {
                        mono: ['Courier New', 'monospace'],
                    },
                    boxShadow: {
                        brutal: '8px 8px 0px 0px #0D0D0D',
                        'brutal-hover': '4px 4px 0px 0px #0D0D0D'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: 
                repeating-linear-gradient(45deg, #f5f5f5, #f5f5f5 10px, #eeeeee 10px, #eeeeee 20px);
            font-family: 'Courier New', monospace;
        }
        .brutal-card {
            box-shadow: 8px 8px 0px 0px #0D0D0D;
            transition: all 0.1s ease;
        }
        .brutal-card:hover {
            box-shadow: 4px 4px 0px 0px #0D0D0D;
            transform: translate(4px, 4px);
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .fade-in {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-brutal-white min-h-screen">
    <header class="bg-brutal-yellow border-4 border-brutal-black mb-8">
        <div class="max-w-6xl mx-auto px-8 py-6">
            <div class="flex justify-between items-center">
                <a href="{% url 'inicio' %}" class="flex items-center gap-3 text-2xl font-bold uppercase tracking-wider text-brutal-black">
                    <i class="bi bi-mortarboard-fill"></i> KIMÜN
                </a>
                <nav class="flex items-center gap-6">
                    <a href="#" class="font-bold uppercase text-sm hover:underline decoration-4 decoration-brutal-black">CURSOS</a>
                    <a href="#" class="font-bold uppercase text-sm hover:underline decoration-4 decoration-brutal-black">CERTIFICADOS</a>
                    <div class="h-6 w-px bg-brutal-black"></div>
                    <div class="flex items-center gap-3">
                        <div class="bg-brutal-black text-brutal-yellow px-3 py-1 font-bold text-sm">
                            {{ user.get_full_name|default:user.username|upper }}
                        </div>
                        <form action="{% url 'usuarios:logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="bg-brutal-black text-brutal-yellow px-3 py-1 font-bold uppercase text-sm hover:bg-brutal-gray">
                                <i class="bi bi-box-arrow-right"></i> SALIR
                            </button>
                        </form>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-8 pb-12">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
